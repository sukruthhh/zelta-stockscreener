version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zelta-stockscreener_postgres
    environment:
      POSTGRES_USER: dev_admin
      POSTGRES_PASSWORD: cookGuddi
      POSTGRES_DB: zelta_stocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    # 👇 This clean, one-liner cleanly registers pgvector on startup safely
    entrypoint: [ "docker-entrypoint.sh", "postgres", "-c", "shared_preload_libraries=vector" ]

  redis:
    image: redis:7-alpine
    container_name: zelta-stockscreener_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata: