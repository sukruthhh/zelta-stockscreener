services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zelta-stockscreener_postgres
    environment:
      POSTGRES_USER: dev_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-only}
      POSTGRES_DB: zelta_stocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    # 👇 This clean, one-liner cleanly registers pgvector on startup safely
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_admin -d zelta_stocks"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zelta-stockscreener_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
